name: resourcepack artifact
on: [push]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: upload
              uses: actions/upload-artifact@v4
              with:
                  name: resource-pack
                  path: |
                        pack.mcemta
                        pack.png
                        assets/*
                        !*.git*
                        !*.py