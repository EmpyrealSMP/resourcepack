name: resourcepack artifact
on: [push]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@master
            - name: lazy zip
              uses: thedoctor0/zip-release@0.7.5
              with:
                type: 'zip'
                filename: 'artifact_release.zip'
                exclusions: '*.git*'

            - name: upload
              uses: actions/upload-artifact@v4
              with:
                  name: deployment-package
                  path: artifact_release.zip